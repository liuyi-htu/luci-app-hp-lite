name: Build OpenWrt Firmware

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build firmware
        run: |
          chmod +x ./build-cudy-tr3000-openwrt-immortalwrt.sh

          # 避免 GitHub Actions 卡在交互输入
          yes "" | ./build-cudy-tr3000-openwrt-immortalwrt.sh

      - name: Collect firmware files
        run: |
          mkdir -p release

          echo "开始查找固件文件..."

          find . -path "*/bin/targets/*" -type f \
            \( -name "*sysupgrade*.bin" \
            -o -name "*factory*.bin" \
            -o -name "*.itb" \
            -o -name "*.img" \
            -o -name "*.bin" \
            -o -name "*.manifest" \
            -o -name "*.buildinfo" \
            -o -name "*.sha256sums" \
            -o -name "version.buildinfo" \
            -o -name "profiles.json" \) \
            -exec cp -v {} release/ \;

          cd release

          if [ -z "$(ls -A .)" ]; then
            echo "没有找到任何固件文件"
            exit 1
          fi

          echo "生成 sha256 校验文件..."
          sha256sum * > sha256sums.txt || true

          echo "本次准备上传的文件："
          ls -lh

      - name: Detect firmware version
        id: version
        run: |
          echo "开始识别固件版本..."

          FIRMWARE_FILE="$(find release -maxdepth 1 -type f \
            \( -name "*sysupgrade*.bin" \
            -o -name "*factory*.bin" \
            -o -name "*.itb" \
            -o -name "*.img" \
            -o -name "*.bin" \) \
            | sort | head -n 1)"

          if [ -z "$FIRMWARE_FILE" ]; then
            echo "没有找到可用于识别版本的固件文件"
            exit 1
          fi

          BASENAME="$(basename "$FIRMWARE_FILE")"
          NAME_NO_EXT="${BASENAME%.*}"

          echo "用于识别版本的文件：$BASENAME"

          DIST="$(echo "$NAME_NO_EXT" | cut -d '-' -f 1)"
          SECOND_FIELD="$(echo "$NAME_NO_EXT" | cut -d '-' -f 2)"

          # 情况 1：
          # openwrt-23.05.5-xxx
          # immortalwrt-24.10.2-xxx
          if echo "$SECOND_FIELD" | grep -Eq '^[0-9]+(\.[0-9]+)+$'; then
            VERSION="${DIST}-${SECOND_FIELD}"
          else
            # 情况 2：
            # snapshot 文件名里没有 24.10.2 这种版本号
            # 尝试从 version.buildinfo 读取 rxxxxx-xxxxxxx
            VERSION_BUILDINFO="$(find release -maxdepth 1 -type f -name "version.buildinfo" | head -n 1)"

            if [ -n "$VERSION_BUILDINFO" ]; then
              RAW_VERSION="$(head -n 1 "$VERSION_BUILDINFO" | tr -d '\r\n ')"
              VERSION="${DIST}-${RAW_VERSION}"
            else
              # 最后兜底：使用固件文件名
              VERSION="$NAME_NO_EXT"
            fi
          fi

          # 清理 tag 名，只保留安全字符
          TAG="$(echo "$VERSION" \
            | sed 's/[[:space:]]/-/g' \
            | sed 's#[/:]#-#g' \
            | sed 's/[^A-Za-z0-9._-]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')"

          if [ -z "$TAG" ]; then
            echo "版本识别失败"
            exit 1
          fi

          echo "识别到 Release 标签：$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          TITLE: ${{ steps.version.outputs.title }}
        run: |
          DISPLAY_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          NOTES=$(cat <<EOF
          自动编译固件

          固件版本：${TAG}
          编译时间：${DISPLAY_TIME}
          分支：${GITHUB_REF_NAME}
          Commit：${GITHUB_SHA}
          Workflow Run：${GITHUB_RUN_NUMBER}
          Run Attempt：${GITHUB_RUN_ATTEMPT}

          下载固件前建议先核对 sha256sums.txt。
          EOF
          )

          echo "更新 tag：${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -fa "$TAG" "$GITHUB_SHA" -m "Firmware build ${TAG}"
          git push origin "refs/tags/$TAG" --force

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release 已存在，开始覆盖上传：${TAG}"

            echo "删除旧附件..."
            OLD_ASSETS="$(gh release view "$TAG" --json assets -q '.assets[].name')"

            if [ -n "$OLD_ASSETS" ]; then
              while IFS= read -r ASSET_NAME; do
                if [ -n "$ASSET_NAME" ]; then
                  echo "删除旧附件：$ASSET_NAME"
                  gh release delete-asset "$TAG" "$ASSET_NAME" -y || true
                fi
              done <<< "$OLD_ASSETS"
            fi

            echo "更新 Release 信息..."
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest

            echo "重新上传新附件..."
            gh release upload "$TAG" release/* --clobber
          else
            echo "Release 不存在，创建新 Release：${TAG}"

            gh release create "$TAG" release/* \
              --title "$TITLE" \
              --notes "$NOTES" \
              --latest \
              --target "$GITHUB_SHA"
          fi
