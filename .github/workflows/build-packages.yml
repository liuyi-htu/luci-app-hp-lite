name: Build OpenWrt packages

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  OPENWRT_TARGET: x86
  OPENWRT_SUBTARGET: "64"

jobs:
  build:
    name: Build ${{ matrix.format }} on OpenWrt ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: ipk
            openwrt_version: 24.10.7
          - format: apk
            openwrt_version: 25.12.4

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            file \
            gawk \
            gettext \
            git \
            libelf-dev \
            libncurses-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            xz-utils \
            zlib1g-dev \
            zstd

      - name: Download OpenWrt SDK
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
        run: |
          set -euo pipefail

          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          sdk_listing="$(mktemp)"
          wget -qO "${sdk_listing}" "${base_url}/"
          sdk_file="$(awk 'match($0, /openwrt-sdk-[^"]+Linux-x86_64\.tar\.(xz|zst)/) { print substr($0, RSTART, RLENGTH); exit }' "${sdk_listing}")"

          if [ -z "${sdk_file}" ]; then
            echo "Unable to find an OpenWrt SDK archive at ${base_url}" >&2
            exit 1
          fi

          wget -q "${base_url}/${sdk_file}"
          tar -xf "${sdk_file}"

          sdk_dir="$(find "${PWD}" -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"
          if [ -z "${sdk_dir}" ]; then
            echo "SDK archive extracted without an openwrt-sdk-* directory" >&2
            exit 1
          fi

          echo "SDK_DIR=${sdk_dir}" >> "${GITHUB_ENV}"

      - name: Build package
        run: |
          set -euo pipefail

          cd "${SDK_DIR}"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          mkdir -p package/luci-app-hp-lite
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            "${GITHUB_WORKSPACE}/" \
            package/luci-app-hp-lite/

          make defconfig
          make package/luci-app-hp-lite/compile V=s -j"$(nproc)"

      - name: Collect ${{ matrix.format }} packages
        run: |
          set -euo pipefail

          out_dir="${GITHUB_WORKSPACE}/dist/${{ matrix.format }}"
          mkdir -p "${out_dir}"

          find "${SDK_DIR}/bin/packages" \
            -type f \
            -name "*hp-lite*.${{ matrix.format }}" \
            -print \
            -exec cp -v {} "${out_dir}/" \;

          package_count="$(find "${out_dir}" -type f -name "*.${{ matrix.format }}" | wc -l)"
          if [ "${package_count}" -eq 0 ]; then
            echo "Expected *.${{ matrix.format }} packages, but none were found." >&2
            find "${SDK_DIR}/bin/packages" -type f | sort | tail -n 200
            exit 1
          fi

      - name: Upload ${{ matrix.format }} packages
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-hp-lite-${{ matrix.format }}-${{ matrix.openwrt_version }}
          path: dist/${{ matrix.format }}/*
          if-no-files-found: error

  release:
    name: Upload packages to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mapfile -t packages < <(find dist -type f \( -name '*.ipk' -o -name '*.apk' \) | sort)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No package artifacts were downloaded." >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${packages[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${packages[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated OpenWrt package build."
          fi
